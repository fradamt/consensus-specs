# Mainnet preset - Gloas

# Misc
# ---------------------------------------------------------------
# 2**9 (= 512) validators
PTC_SIZE: 512

# Max operations per block
# ---------------------------------------------------------------
# 2**2 (= 4) attestations
MAX_PAYLOAD_ATTESTATIONS: 4

# State list lengths
# ---------------------------------------------------------------
# 2**40 (= 1,099,511,627,776) builder spots
BUILDER_REGISTRY_LIMIT: 1099511627776
# 2**20 (= 1,048,576) builder pending withdrawals
BUILDER_PENDING_WITHDRAWALS_LIMIT: 1048576
# 2**10 (= 1,024) slashing-period buckets (~51 years total)
PERIODS_PER_SLASHINGS_VECTOR: 1024

# Withdrawals processing
# ---------------------------------------------------------------
# 2**14 (= 16,384) builders
MAX_BUILDERS_PER_WITHDRAWALS_SWEEP: 16384

# Slashing
# ---------------------------------------------------------------
# 2**12 (= 4,096) epochs (~18 days)
EPOCHS_PER_SLASHING_PERIOD: 4096
# 2**13 (= 8,192) epochs (~36 days); must be >= 2 * EPOCHS_PER_SLASHING_PERIOD
MIN_SLASHED_VALIDATOR_WITHDRAWABILITY_DELAY: 8192
